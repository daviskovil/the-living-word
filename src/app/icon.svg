<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Book cover -->
  <rect x="4" y="3" width="24" height="26" rx="2" fill="#4f46e5"/>
  <!-- Spine highlight -->
  <rect x="4" y="3" width="3" height="26" rx="1" fill="#4338ca"/>
  <!-- Pages -->
  <rect x="8" y="5" width="18" height="22" rx="1" fill="#fafafa"/>
  <!-- Cross on cover -->
  <rect x="15.5" y="8" width="2" height="12" rx="0.5" fill="#4f46e5"/>
  <rect x="11" y="12.5" width="11" height="2" rx="0.5" fill="#4f46e5"/>
  <!-- Page lines -->
  <line x1="11" y1="22" x2="22" y2="22" stroke="#d4d4d8" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="11" y1="24" x2="19" y2="24" stroke="#d4d4d8" stroke-width="0.8" stroke-linecap="round"/>
</svg>
